name: CI

on: [pull_request]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod
          cache: true

      - name: mod download
        run: go mod download

      - name: build
        run: make build

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod
          cache: true

      - name: test
        run: make test

  lint-go:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Optional: version of golangci-lint to use in form of v1.2 or v1.2.3 or `latest` to use the latest version
          version: v2.11.3

          # Optional: working directory, useful for monorepos
          # working-directory: somedir

          # Optional: golangci-lint command line arguments.
          # args: -v --timeout=10m -c .golangci.yml `git diff --name-only --diff-filter=ACMRT ${{ github.sha }}^ ${{ github.sha }} | grep .go$ | xargs -I{} dirname {} | sort | uniq`
          args: -v --timeout=10m -c .golangci.yml

          # Optional: show only new issues if it's a pull request. The default value is `false`.
          only-new-issues: true

          # Optional: if set to true then the all caching functionality will be complete disabled,
          #           takes precedence over all other caching options.
          # skip-cache: true

          # Optional: if set to true then the action don't cache or restore ~/go/pkg.
          # skip-pkg-cache: true

          # Optional: if set to true then the action don't cache or restore ~/.cache/go-build.
          # skip-build-cache: true

  lint-proto:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod
          cache: true

      - name: proto lint
        run: |
          make lint.proto

  lint-typos:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check typos
        uses: crate-ci/typos@v1.44.0
        with:
          files: ./
          config: ./_typos.toml

  e2e-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check E2E endpoint coverage
        run: make e2e.cover

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      ENV: local
      PORT: "8080"
      MIN_LOG_LEVEL: debug
      DB_HOST: "tcp(localhost:3306)"
      DB_USER: root
      DB_PASSWORD: password
      DB_DATABASE: maindb
      DB_LOG_ENABLE: "false"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_PASSWORD: password
      REDIS_USERNAME: ""
      REDIS_TLS_ENABLE: "false"
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: ap-northeast-1
      AWS_EMULATOR_HOST: localhost:4566
      AWS_COGNITO_EMULATOR_HOST: "http://localhost:9229"
      AWS_PRIVATE_BUCKET_NAME: local-private-asset-bucket
      AWS_PUBLIC_BUCKET_NAME: local-public-asset-bucket
      AWS_PUBLIC_ASSET_BASE_URL: "http://localhost:4566/local-public-asset-bucket"
      AWS_COGNITO_STAFF_USER_POOL_ID: placeholder
      AWS_COGNITO_STAFF_CLIENT_ID: placeholder
      AWS_COGNITO_ADMIN_USER_POOL_ID: placeholder
      AWS_COGNITO_ADMIN_CLIENT_ID: placeholder
      GCP_PROJECT_ID: sample
      FIREBASE_CLIENT_API_KEY: sample
      FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
      GCS_EMULATOR_HOST: "http://localhost:4443"
      GCP_PRIVATE_BUCKET_NAME: local-private-bucket
      GCP_PUBLIC_BUCKET_NAME: local-public-bucket
      GCP_PUBLIC_ASSET_BASE_URL: "http://localhost:4443/local-public-bucket"
      SPANNER_PROJECT_ID: test-project
      SPANNER_INSTANCE_ID: test-instance
      SPANNER_DATABASE_ID: test-database
      SPANNER_EMULATOR_HOST: localhost:9010

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod
          cache: true

      - name: Install postgresql-client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create .cognito data directory
        run: mkdir -p emulator/aws/cognito/.cognito

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 5432 -U postgres 2>/dev/null; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "PostgreSQL failed to start"
          exit 1

      - name: Wait for LocalStack
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_localstack/health | grep -q '"s3"'; then
              echo "LocalStack is ready"
              exit 0
            fi
            echo "Waiting for LocalStack... ($i/30)"
            sleep 2
          done
          echo "LocalStack failed to start"
          exit 1

      - name: Verify LocalStack init completed
        run: |
          for i in $(seq 1 15); do
            if aws --endpoint-url=http://localhost:4566 s3 ls s3://local-private-asset-bucket 2>/dev/null; then
              echo "LocalStack init completed (S3 buckets exist)"
              exit 0
            fi
            echo "Waiting for LocalStack init... ($i/15)"
            sleep 2
          done
          echo "LocalStack init did not complete"
          exit 1

      - name: Run migrations
        run: /usr/bin/make migrate.up.ci

      - name: Initialize Cognito user pools
        run: |
          # Wait for Cognito Local to be ready by retrying create-user-pool
          for i in $(seq 1 30); do
            staff_user_pool_id=$(aws \
              --endpoint-url=http://localhost:9229 \
              cognito-idp create-user-pool --pool-name ci-staff-user-pool \
              --username-attributes email \
              --schema \
                'Name=tenant_id,AttributeDataType=String,DeveloperOnlyAttribute=false,Required=false,StringAttributeConstraints={MinLength=1,MaxLength=256}' \
                'Name=staff_id,AttributeDataType=String,DeveloperOnlyAttribute=false,Required=false,StringAttributeConstraints={MinLength=1,MaxLength=256}' \
                'Name=staff_role,AttributeDataType=String,DeveloperOnlyAttribute=false,Required=false,StringAttributeConstraints={MinLength=1,MaxLength=256}' \
              --query UserPool.Id --output text 2>/dev/null) && break
            echo "Waiting for Cognito Local... ($i/30)"
            sleep 2
          done

          if [ -z "$staff_user_pool_id" ]; then
            echo "Cognito Local failed to start"
            exit 1
          fi
          echo "Staff user pool ID: $staff_user_pool_id"

          staff_client_id=$(aws \
            --endpoint-url=http://localhost:9229 \
            cognito-idp create-user-pool-client \
            --user-pool-id "$staff_user_pool_id" \
            --client-name ci-staff-client \
            --query UserPoolClient.ClientId --output text)
          echo "Staff client ID: $staff_client_id"

          admin_user_pool_id=$(aws \
            --endpoint-url=http://localhost:9229 \
            cognito-idp create-user-pool --pool-name ci-admin-user-pool \
            --username-attributes email \
            --schema \
              'Name=admin_id,AttributeDataType=String,DeveloperOnlyAttribute=false,Required=false,StringAttributeConstraints={MinLength=1,MaxLength=256}' \
              'Name=admin_role,AttributeDataType=String,DeveloperOnlyAttribute=false,Required=false,StringAttributeConstraints={MinLength=1,MaxLength=256}' \
            --query UserPool.Id --output text)
          echo "Admin user pool ID: $admin_user_pool_id"

          admin_client_id=$(aws \
            --endpoint-url=http://localhost:9229 \
            cognito-idp create-user-pool-client \
            --user-pool-id "$admin_user_pool_id" \
            --client-name ci-admin-client \
            --query UserPoolClient.ClientId --output text)
          echo "Admin client ID: $admin_client_id"

          echo "AWS_COGNITO_STAFF_USER_POOL_ID=$staff_user_pool_id" >> "$GITHUB_ENV"
          echo "AWS_COGNITO_STAFF_CLIENT_ID=$staff_client_id" >> "$GITHUB_ENV"
          echo "AWS_COGNITO_ADMIN_USER_POOL_ID=$admin_user_pool_id" >> "$GITHUB_ENV"
          echo "AWS_COGNITO_ADMIN_CLIENT_ID=$admin_client_id" >> "$GITHUB_ENV"

      - name: Run E2E tests
        run: make e2e

      - name: Show docker compose logs on failure
        if: failure()
        run: docker compose logs --tail=100
